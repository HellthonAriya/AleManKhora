<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0c1320" />
  <meta name="description" content="اِل من خورا — بازی استراتژیک آنلاین: حرکت کن یا مانع بساز. بازی با دوستان، حریف تصادفی و هوش مصنوعی." />
  <title>اِل من خورا</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body data-theme="emerald">
  <div id="bg-orbs" aria-hidden="true">
    <span class="orb orb-a"></span>
    <span class="orb orb-b"></span>
    <span class="orb orb-c"></span>
  </div>

  <header id="topbar">
    <a href="#/" class="brand" data-link>
      <svg class="brand-mark" viewBox="0 0 48 48" width="34" height="34" aria-hidden="true">
        <rect x="4" y="4" width="40" height="40" rx="9" fill="url(#bg)"/>
        <circle cx="17" cy="31" r="5" fill="#fff"/>
        <circle cx="31" cy="17" r="5" fill="#ffd36b"/>
        <rect x="13" y="13" width="22" height="4" rx="2" fill="#fff" opacity=".85" transform="rotate(45 24 24)"/>
        <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#13c08a"/><stop offset="1" stop-color="#0e8f7e"/>
        </linearGradient></defs>
      </svg>
      <span class="brand-name">اِل من خورا</span>
    </a>
    <nav class="topnav" id="topnav"></nav>
  </header>

  <main id="app" class="app"><!-- views render here --></main>

  <div id="toast-stack" class="toast-stack" aria-live="polite"></div>
  <div id="modal-root"></div>

  <footer id="footer">
    <span>اِل من خورا © ۲۰۲۶ — بازی کن، مانع بساز، برنده شو.</span>
  </footer>

  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
